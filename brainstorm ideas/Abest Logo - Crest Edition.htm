<!DOCTYPE html>

<html lang="vi"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>Abest Logo - Crest Edition</title>
<link href="./Abest Logo - Crest Edition_files/css2" rel="stylesheet">
<style>
  body {
    font-family: 'Manrope', -apple-system, sans-serif;
    background: #f5f5f7;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
  }
  .logo-card {
    background: white;
    border-radius: 20px;
    padding: 50px 40px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 620px;
    text-align: center;
  }
  .logo-card.navy { background: #0a1d3a; }
  .logo-card.gold {
    background: linear-gradient(135deg, #1e3a5f 0%, #0a1d3a 100%);
  }
  h2 {
    margin-top: 25px;
    color: #555;
    font-weight: 500;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .navy h2, .gold h2 { color: #c9a961; }
</style>
</head>
<body>

<!-- LOGO CHÍNH - Phong cách huy hiệu -->
<div class="logo-card">
  <svg width="480" height="170" viewBox="0 0 480 170" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <lineargradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f0d28a"></stop>
        <stop offset="50%" stop-color="#d4b46a"></stop>
        <stop offset="100%" stop-color="#a08442"></stop>
      </lineargradient>
      <lineargradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#1e3a5f"></stop>
        <stop offset="100%" stop-color="#0a1d3a"></stop>
      </lineargradient>
    </defs>

    <!-- HUY HIỆU CREST -->
    <g transform="translate(20, 15)">
      <!-- Hình khiên/crest cách điệu -->
      <!-- Vòng tròn chính -->
      <circle cx="65" cy="70" r="65" fill="url(#navyGrad)"></circle>
      
      <!-- Viền gold đậm bên ngoài -->
      <circle cx="65" cy="70" r="62" fill="none" stroke="url(#goldGrad)" stroke-width="2"></circle>
      
      <!-- Viền gold mảnh phía trong - tạo khung kép kinh điển -->
      <circle cx="65" cy="70" r="56" fill="none" stroke="url(#goldGrad)" stroke-width="0.8"></circle>
      
      <!-- Các đường ray trang trí kinh điển ở 4 hướng (kiểu huy hiệu hoàng gia) -->
      <!-- Trên -->
      <line x1="65" y1="8" x2="65" y2="14" stroke="url(#goldGrad)" stroke-width="1.5"></line>
      <!-- Dưới -->
      <line x1="65" y1="126" x2="65" y2="132" stroke="url(#goldGrad)" stroke-width="1.5"></line>
      <!-- Trái -->
      <line x1="3" y1="70" x2="9" y2="70" stroke="url(#goldGrad)" stroke-width="1.5"></line>
      <!-- Phải -->
      <line x1="121" y1="70" x2="127" y2="70" stroke="url(#goldGrad)" stroke-width="1.5"></line>
      
      <!-- Các ngôi sao nhỏ xung quanh - tinh tế -->
      <g fill="url(#goldGrad)">
        <!-- Sao trái -->
        <g transform="translate(20, 70)">
          <path d="M 0 -2.5 L 0.7 -0.7 L 2.5 0 L 0.7 0.7 L 0 2.5 L -0.7 0.7 L -2.5 0 L -0.7 -0.7 Z"></path>
        </g>
        <!-- Sao phải -->
        <g transform="translate(110, 70)">
          <path d="M 0 -2.5 L 0.7 -0.7 L 2.5 0 L 0.7 0.7 L 0 2.5 L -0.7 0.7 L -2.5 0 L -0.7 -0.7 Z"></path>
        </g>
      </g>
      
      <!-- CHỮ A ĐỠN GIẢN, CHUẨN MỰC - PHONG CÁCH HUY HIỆU -->
      <!-- Chữ A serif cổ điển, nét rõ ràng, không cách điệu -->
      <text x="65" y="92" font-family="&#39;Trajan Pro&#39;, &#39;Cinzel&#39;, &#39;Times New Roman&#39;, serif" font-size="78" font-weight="700" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="0">A</text>
      
      <!-- Dải băng nhỏ phía dưới chữ A - kiểu huy hiệu -->
      <g transform="translate(65, 108)">
        <line x1="-18" y1="0" x2="18" y2="0" stroke="url(#goldGrad)" stroke-width="1"></line>
        <circle cx="0" cy="0" r="1.5" fill="url(#goldGrad)"></circle>
      </g>
    </g>

    <!-- TÊN THƯƠNG HIỆU -->
    <g transform="translate(170, 65)">
      <text x="0" y="35" font-family="&#39;Manrope&#39;, sans-serif" font-size="58" font-weight="800" fill="#0a1d3a" letter-spacing="-3">
        Abest
      </text>
      <!-- Đường kẻ trang trí -->
      <g transform="translate(2, 52)">
        <line x1="0" y1="0" x2="35" y2="0" stroke="#c9a961" stroke-width="1.5"></line>
        <circle cx="40" cy="0" r="1.8" fill="#c9a961"></circle>
        <line x1="45" y1="0" x2="55" y2="0" stroke="#c9a961" stroke-width="1.5" opacity="0.5"></line>
      </g>
      <text x="65" y="56" font-family="&#39;Manrope&#39;, sans-serif" font-size="10.5" font-weight="500" fill="#0a1d3a" letter-spacing="3.5">
        EXCELLENCE IN LANGUAGE
      </text>
    </g>
  </svg>
  <h2>Logo chính (nền sáng)</h2>
</div>

        Abest
      </text>
      <g transform="translate(2, 52)">
        <line x1="0" y1="0" x2="35" y2="0" stroke="#d4b46a" stroke-width="1.5"></line>
        <circle cx="40" cy="0" r="1.8" fill="#d4b46a"></circle>
        <line x1="45" y1="0" x2="55" y2="0" stroke="#d4b46a" stroke-width="1.5" opacity="0.5"></line>
      </g>
      <text x="65" y="56" font-family="&#39;Manrope&#39;, sans-serif" font-size="10.5" font-weight="500" fill="#d4b46a" letter-spacing="3.5">
        EXCELLENCE IN LANGUAGE
      </text>
    </g>
  </svg>
  <h2>Phiên bản nền navy</h2>
</div>

<!-- ICON HUY HIỆU ĐƠN -->
